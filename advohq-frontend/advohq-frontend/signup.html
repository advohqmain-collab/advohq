<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdvoHQ — Create Account</title>
  <link rel="icon" type="image/png" href="logo-footer.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --ink: #2d3748;
      --ink-2: #3a4a5c;
      --ink-3: #4a5a6e;
      --ink-4: #6b7a8d;
      --line: #d0d4db;
      --line-soft: #dde0e5;
      --surface: #ffffff;
      --surface-2: #e8eaed;
      --surface-3: #dde0e5;
      --danger: #b91c1c;
      --r-sm: 12px;
      --r-md: 20px;
      --r-lg: 28px;
      --r-xl: 40px;
      --shadow-lg: 0 16px 40px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.05);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--surface-2);
      color: var(--ink);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }

    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: var(--surface-2);
      background-image: radial-gradient(circle at 20% 20%, rgba(0,0,0,0.03) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0,0,0,0.02) 0%, transparent 50%);
    }

    .login-card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
    }

    .login-logo {
      font-family: 'Playfair Display', 'Instrument Serif', serif;
      font-size: 2.2rem;
      font-weight: 500;
      letter-spacing: -0.3px;
      margin-bottom: 0.25rem;
    }
    .logo-advo { color: #1e2d4a; }
    .logo-hq   { color: #b8922a; }

    .login-sub {
      font-size: 0.82rem;
      color: var(--ink-4);
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--line-soft);
      padding-bottom: 1.5rem;
    }

    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-3);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .field input {
      width: 100%;
      padding: 0.65rem 1rem;
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      background: var(--surface);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--ink);
      transition: border-color 0.15s;
    }
    .field input:focus { outline: none; border-color: var(--ink); }

    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 2.6rem; }
    .pw-toggle {
      position: absolute; right: 0.9rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--ink-4); padding: 0; font-size: 0.85rem;
      transition: color 0.15s;
    }
    .pw-toggle:hover { color: var(--ink); }

    .strength-bar {
      height: 3px; border-radius: 99px;
      background: var(--line-soft);
      margin-top: 0.4rem; overflow: hidden;
    }
    .strength-fill {
      height: 100%; border-radius: 99px;
      transition: width 0.3s, background 0.3s;
      width: 0%;
    }
    .strength-label {
      font-size: 0.68rem; color: var(--ink-4); margin-top: 0.25rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1.2rem;
      border-radius: var(--r-xl);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-primary { background: #1e3a5f; color: #fff; }
    .btn-primary:hover { background: #2a4a72; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .login-btn-full {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.75rem;
      justify-content: center;
      font-size: 0.9rem;
    }

    .error-msg {
      font-size: 0.82rem;
      color: #c0392b;
      background: #fdf0ef;
      border: 1px solid #f5c6c4;
      border-radius: 10px;
      padding: 0.5rem 0.85rem;
      margin-bottom: 0.75rem;
      display: none;
    }

    .login-hint {
      font-size: 0.72rem;
      color: var(--ink-4);
      text-align: center;
      margin-top: 1.5rem;
      border-top: 1px solid var(--line-soft);
      padding-top: 1rem;
      display: flex;
      justify-content: space-between;
    }
    .hint-link {
      color: var(--ink-4);
      text-decoration: none;
      font-size: 0.75rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.15s;
    }
    .hint-link:hover { color: var(--ink); }
    .hint-link.primary { color: #1e3a5f; font-weight: 600; }
    .hint-link.primary:hover { color: #2a4a72; }
  </style>
  <script>window.ADVOHQ_API_URL = 'https://test-4-wheat.vercel.app/api';</script>
  <script src="api-client.js"></script>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo"><span class="logo-advo">Advo</span><span class="logo-hq">HQ</span></div>
    <div class="login-sub">Create your account · Case &amp; Brief Management</div>

    <div class="field-row">
      <div class="field">
        <label>First &amp; Last Name</label>
        <input type="text" id="signupName" placeholder="e.g. Adv. Sharma" autocomplete="name">
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="signupUsername" placeholder="e.g. sharma92" autocomplete="username">
      </div>
    </div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="field">
      <label>Password</label>
      <div class="password-wrap">
        <input type="password" id="signupPassword" placeholder="Min. 6 characters" autocomplete="new-password">
        <button class="pw-toggle" type="button" onclick="togglePw()" title="Show/hide password">
          <i class="fas fa-eye" id="pwIcon"></i>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>

    <div class="field">
      <label>Confirm Password</label>
      <div class="password-wrap">
        <input type="password" id="signupConfirm" placeholder="Re-enter password" autocomplete="new-password">
      </div>
    </div>

    <div class="error-msg" id="signupError"></div>

    <button class="btn btn-primary login-btn-full" id="signupBtn" onclick="doSignup()">
      <i class="fas fa-user-plus"></i> Create Account
    </button>

    <div class="login-hint">
      <a href="advohq-home.html" class="hint-link">← Home</a>
      <span>Already have an account? <a href="login2.html" class="hint-link primary">Sign In →</a></span>
    </div>

  </div>
</div>

<script>
  // ── Password strength ────────────────────────────────────────────
  document.getElementById('signupPassword').addEventListener('input', function () {
    const pw = this.value;
    const fill   = document.getElementById('strengthFill');
    const label  = document.getElementById('strengthLabel');
    if (!pw) { fill.style.width = '0%'; label.textContent = ''; return; }
    let score = 0;
    if (pw.length >= 6)  score++;
    if (pw.length >= 10) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const levels = [
      { w: '20%', bg: '#dc2626', text: 'Weak' },
      { w: '40%', bg: '#f97316', text: 'Fair' },
      { w: '60%', bg: '#eab308', text: 'Good' },
      { w: '80%', bg: '#22c55e', text: 'Strong' },
      { w: '100%',bg: '#16a34a', text: 'Very strong' },
    ];
    const l = levels[Math.min(score - 1, 4)] || levels[0];
    fill.style.width      = l.w;
    fill.style.background = l.bg;
    label.textContent     = l.text;
    label.style.color     = l.bg;
  });

  // ── Show/hide password ───────────────────────────────────────────
  function togglePw() {
    const inp  = document.getElementById('signupPassword');
    const icon = document.getElementById('pwIcon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      inp.type = 'password';
      icon.className = 'fas fa-eye';
    }
  }

  // ── Sign Up ──────────────────────────────────────────────────────
  async function doSignup() {
    const name     = document.getElementById('signupName').value.trim();
    const username = document.getElementById('signupUsername').value.trim();
    const email    = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm  = document.getElementById('signupConfirm').value;
    const errEl    = document.getElementById('signupError');
    const btn      = document.getElementById('signupBtn');

    errEl.style.display = 'none';

    if (!name || !username || !email || !password) {
      errEl.textContent = 'Please fill in all fields.';
      errEl.style.display = 'block'; return;
    }
    if (password.length < 6) {
      errEl.textContent = 'Password must be at least 6 characters.';
      errEl.style.display = 'block'; return;
    }
    if (password !== confirm) {
      errEl.textContent = 'Passwords do not match.';
      errEl.style.display = 'block'; return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account…';

    try {
      await AdvoAPI.auth.register(username, email, name, password);
      const next = new URLSearchParams(window.location.search).get('next') || 'advohq-home.html';
      window.location.href = next;
    } catch (e) {
      errEl.textContent = e.message || 'Could not create account. Please try again.';
      errEl.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
    }
  }

  document.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') doSignup();
  });
</script>

</body>
</html>
