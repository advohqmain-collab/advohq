<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AdvoHQ — Login</title>
  <link rel="icon" type="image/png" href="logo-footer.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --ink: #2d3748;
      --ink-2: #3a4a5c;
      --ink-3: #4a5a6e;
      --ink-4: #6b7a8d;
      --line: #d0d4db;
      --line-soft: #dde0e5;
      --surface: #ffffff;
      --surface-2: #e8eaed;
      --surface-3: #dde0e5;
      --danger: #b91c1c;
      --r-sm: 12px;
      --r-md: 20px;
      --r-lg: 28px;
      --r-xl: 40px;
      --shadow-lg: 0 16px 40px rgba(0,0,0,0.10), 0 4px 12px rgba(0,0,0,0.05);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--surface-2);
      color: var(--ink);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 99px; }

    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: var(--surface-2);
      background-image: radial-gradient(circle at 20% 20%, rgba(0,0,0,0.03) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(0,0,0,0.02) 0%, transparent 50%);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--r-lg);
      padding: 2.5rem;
      box-shadow: var(--shadow-lg);
    }

    .login-logo {
      font-family: 'Playfair Display', 'Instrument Serif', serif;
      font-size: 2.2rem;
      font-weight: 500;
      letter-spacing: -0.3px;
      margin-bottom: 0.25rem;
    }
    .logo-advo { color: #1e2d4a; }
    .logo-hq   { color: #b8922a; }

    .login-sub {
      font-size: 0.82rem;
      color: var(--ink-4);
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--line-soft);
      padding-bottom: 1.5rem;
    }

    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--ink-3);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .field input {
      width: 100%;
      padding: 0.65rem 1rem;
      border: 1px solid var(--line);
      border-radius: var(--r-md);
      background: var(--surface);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      color: var(--ink);
      transition: border-color 0.15s;
    }
    .field input:focus { outline: none; border-color: var(--ink); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 1.2rem;
      border-radius: var(--r-xl);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-primary { background: #1e3a5f; color: #fff; }
    .btn-primary:hover { background: #2a4a72; }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .login-btn-full {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.75rem;
      justify-content: center;
      font-size: 0.9rem;
    }

    .login-hint {
      font-size: 0.72rem;
      color: var(--ink-4);
      text-align: center;
      margin-top: 1.5rem;
      border-top: 1px solid var(--line-soft);
      padding-top: 1rem;
      display: flex;
      justify-content: space-between;
    }
    .hint-link {
      color: var(--ink-4);
      text-decoration: none;
      font-size: 0.75rem;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      transition: color 0.15s;
    }
    .hint-link:hover { color: var(--ink); }
  </style>
  <script>window.ADVOHQ_API_URL = 'https://test-4-wheat.vercel.app/api';</script>
  <script src="api-client.js"></script>
</head>
<body>

<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo"><span class="logo-advo">Advo</span><span class="logo-hq">HQ</span></div>
    <div class="login-sub">Member login · Case &amp; Brief Management</div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="loginUsername" placeholder="" autocomplete="username">
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="" autocomplete="current-password">
    </div>

    <div id="loginError" style="color:#c0392b;font-size:0.85rem;margin-bottom:0.5rem;display:none;"></div>

    <button class="btn btn-primary login-btn-full" id="loginBtn" onclick="doLogin()">
      <i class="fas fa-arrow-right-to-bracket"></i> Login
    </button>

    <script>
    async function doLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl   = document.getElementById('loginError');
      const btn     = document.getElementById('loginBtn');
      if (!username || !password) {
        errEl.textContent = 'Please enter username and password.';
        errEl.style.display = 'block';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Logging in…';
      errEl.style.display = 'none';
      try {
        await AdvoAPI.auth.login(username, password);
        const next = new URLSearchParams(window.location.search).get('next') || 'advohq-home.html';
        window.location.href = next;
      } catch (e) {
        errEl.textContent = e.message || 'Invalid username or password.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Login';
      }
    }
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
    </script>

    <div class="login-hint">
      <a href="index.html" class="hint-link">← Home</a>
      <span style="color:var(--ink-4)">No account? <a href="signup.html" style="color:#1e3a5f;font-weight:600;text-decoration:none;font-size:0.75rem;">Create one →</a></span>
    </div>

  </div>
</div>

</body>
</html>
