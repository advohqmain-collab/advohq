<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AdvoHQ — Editor</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --navy:    #2c3b4d; --navy-2: #3b4e63; --navy-3: #4d6379;
      --cream:   #eee9df; --cream-2: #e7e1d5; --cream-3: #d8d0c0;
      --gold:    #ffb162; --gold-2: #ffd3a6;
      --muted:   #5a6878; --white: #ffffff; --ink: #1b2632;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: auto; font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); }

    .app { display: flex; min-height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 52px; background: #000;
      display: flex; flex-direction: column; align-items: center; padding: 14px 0;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 50;
      border-right: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-top { display: flex; flex-direction: column; align-items: center; gap: 18px; flex: 1; }
    .sidebar-bottom { display: flex; flex-direction: column; align-items: center; }
    .s-btn {
      width: 36px; height: 36px; border-radius: 8px; border: none;
      background: transparent; color: rgba(245,240,232,0.5);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.18s, color 0.18s;
      position: relative; text-decoration: none;
    }
    .s-btn:hover { background: rgba(245,240,232,0.1); color: rgba(245,240,232,0.9); }
    .s-btn.active { background: rgba(184,146,42,0.18); color: var(--gold-2); }
    .s-btn svg { width: 18px; height: 18px; stroke-width: 1.7; }
    .s-divider { display: none; }
    .s-btn[data-tip]::after {
      content: attr(data-tip); position: absolute; left: calc(100% + 10px); top: 50%;
      transform: translateY(-50%); background: var(--ink); color: var(--cream);
      font-size: 0.72rem; font-weight: 500; padding: 4px 10px; border-radius: 6px;
      white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.15s; z-index: 99;
    }
    .s-btn[data-tip]:hover::after { opacity: 1; }
    .user-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--gold); color: var(--cream); font-weight: 600; font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border: 2px solid rgba(245,240,232,0.15);
      transition: transform 0.15s, box-shadow 0.15s; margin-top: 8px;
    }
    .user-avatar:hover { transform: scale(1.06); box-shadow: 0 0 0 3px rgba(212,170,82,0.3); }

    /* ── MAIN ── */
    .main { margin-left: 52px; flex: 1; display: flex; flex-direction: column; height: 100vh; min-height: 0; overflow: hidden; }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 40;
      background: var(--white); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--cream-2);
      padding: 0 20px; height: 52px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar-left { display: flex; align-items: center; gap: 8px; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.82rem; font-weight: 500; color: var(--muted);
      background: none; border: none; cursor: pointer; padding: 6px 8px;
      border-radius: 8px; transition: background 0.15s, color 0.15s; text-decoration: none;
    }
    .back-btn:hover { background: var(--cream-2); color: var(--navy); }
    .back-btn svg { width: 15px; height: 15px; stroke-width: 2; }
    .topbar-sep { color: var(--cream-3); }
    .topbar-filename {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem; font-weight: 600; color: var(--ink);
      max-width: 340px; min-width: 80px; width: 200px;
      background: transparent; border: 1px solid transparent; border-radius: 7px;
      padding: 4px 8px; margin: 0; outline: none;
      text-overflow: ellipsis; white-space: nowrap;
      cursor: text; transition: background 0.15s, border-color 0.15s;
    }
    .topbar-filename:hover { background: var(--cream-2); }
    .topbar-filename:focus {
      background: var(--white); border-color: rgba(184,146,42,0.45);
      box-shadow: 0 0 0 2px rgba(184,146,42,0.12);
    }
    .topbar-badge {
      font-size: 0.67rem; font-weight: 600; background: var(--white);
      color: #000; border: 1px solid rgba(184,146,42,0.25);
      padding: 3px 9px; border-radius: 20px; letter-spacing: 0.5px; text-transform: uppercase;
    }
    .save-btn {
      display: flex; align-items: center; gap: 7px;
      background: var(--navy); color: var(--cream); border: none; border-radius: 9px;
      padding: 7px 16px; font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .save-btn:hover { background: var(--navy-2); }
    .save-btn svg { width: 14px; height: 14px; stroke-width: 2; }
    .ai-toggle-btn {
      display: flex; align-items: center; gap: 7px;
      background: transparent; color: var(--navy-2); border: 1.5px solid var(--cream-3); border-radius: 9px;
      padding: 6px 14px; font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .ai-toggle-btn:hover { background: var(--cream-2); }
    .ai-toggle-btn.active {
      background: rgba(184,146,42,0.12); color: var(--gold);
      box-shadow: 0 0 0 1.5px var(--gold-2); border-color: transparent;
    }
    .ai-toggle-btn svg { width: 14px; height: 14px; stroke-width: 2; }
    .print-btn {
      display: flex; align-items: center; gap: 7px;
      background: transparent; color: var(--navy-2); border: 1.5px solid var(--cream-3); border-radius: 9px;
      padding: 6px 14px; font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .print-btn:hover { background: var(--cream-2); }
    .print-btn svg { width: 14px; height: 14px; stroke-width: 2; }

    /* ── EDITOR LAYOUT ── */
    .editor-layout { display: flex; flex: 1; overflow: visible; height: calc(100vh - 52px); min-height: 0; }

    /* ── TOOLS PANEL ── */
    /* Tools now live inline inside the topbar (moved there on load) */
    .tools-panel {
      height: 100%; flex: 1 1 auto; min-width: 0;
      display: flex; flex-direction: row; align-items: center;
      padding: 0; margin: 0 14px; gap: 4px;
      overflow-x: auto; overflow-y: hidden;
    }
    .tools-panel::-webkit-scrollbar { height: 4px; }
    .tools-panel::-webkit-scrollbar-thumb { background: var(--cream-3); border-radius: 2px; }
    .tool-section-label {
      font-size: 0.55rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--muted);
      width: auto; text-align: center; padding: 0 2px; white-space: nowrap;
    }
    .tool-sep { width: 1px; height: 30px; background: var(--cream-2); margin: 0 3px; flex-shrink: 0; }
    .tool-btn {
      width: 38px; height: 40px; border-radius: 10px; border: 1.5px solid transparent;
      background: transparent; color: var(--muted);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s; gap: 2px; position: relative;
      flex-shrink: 0;
    }
    .tool-btn:hover { background: var(--cream); color: var(--navy); border-color: var(--cream-2); }
    .tool-btn.active {
      background: rgba(184,146,42,0.1); color: var(--gold);
      border-color: var(--gold-2);
    }
    .tool-btn svg { width: 18px; height: 18px; stroke-width: 1.8; flex-shrink: 0; }
    .tool-btn img.tool-icon { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }
    /* Recolour pen & mark icons to solid black (eraser red baked into PNG; clear/undo left as-is) */
    .tool-icon[src="pen.png"],
    .tool-icon[src="highlighter.png"] { filter: brightness(0); }
    /* Text tool uses an inline SVG — force a solid dark stroke so the "T" is visible
       (the global button rule otherwise paints all button SVGs white). */
    .tools-panel .tool-btn[data-tool="text"] svg {
      stroke: #1b2632 !important; color: #1b2632 !important;
    }
    /* Plain white square toolbar buttons (override the glossy navy skin) */
    .tools-panel .tool-btn {
      background: var(--white) !important;
      color: var(--muted) !important;
      border: 1px solid var(--cream-2) !important;
      border-radius: 8px !important;
      box-shadow: 0 1px 2px rgba(30,45,74,0.06) !important;
      transition: background .15s, border-color .15s, color .15s !important;
    }
    .tools-panel .tool-btn:hover {
      background: var(--cream) !important;
      border-color: var(--cream-3) !important;
      color: var(--navy) !important;
      transform: none !important; filter: none !important;
    }
    .tools-panel .tool-btn.active {
      background: rgba(184,146,42,0.10) !important;
      border-color: #000 !important;
      color: #000 !important;
    }
    .tool-label { font-size: 0.54rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; line-height: 1; }

    /* Colour swatches */
    .color-grid {
      display: grid; grid-template-columns: repeat(3, auto); gap: 3px;
      padding: 0 2px; width: auto; flex-shrink: 0;
    }
    .color-swatch {
      width: 16px; height: 16px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: transform 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    /* Checkerboard backdrop so translucent highlight swatches show through */
    .hl-colors .color-swatch {
      background-image: repeating-conic-gradient(#d0ccc6 0% 25%, #fff 0% 50%);
      background-size: 8px 8px;
      position: relative;
    }
    .hl-colors .color-swatch::after {
      content: '';
      position: absolute; inset: 0;
      border-radius: 50%;
      background: var(--hl-bg);
    }
    .hl-colors .color-swatch[data-color="rgba(255,235,59,0.28)"]  { --hl-bg: rgba(255,230,0,0.38); }
    .hl-colors .color-swatch[data-color="rgba(102,187,106,0.26)"]  { --hl-bg: rgba(72,199,89,0.38); }
    .hl-colors .color-swatch[data-color="rgba(239,83,80,0.24)"]   { --hl-bg: rgba(255,80,80,0.38); }
    .hl-colors .color-swatch[data-color="rgba(66,165,245,0.26)"]   { --hl-bg: rgba(50,160,255,0.38); }
    .hl-colors .color-swatch[data-color="rgba(255,152,0,0.26)"]    { --hl-bg: rgba(255,160,0,0.38); }
    .hl-colors .color-swatch[data-color="rgba(186,104,200,0.26)"]  { --hl-bg: rgba(190,100,210,0.38); }
    .color-swatch:hover { transform: scale(1.2); }
    .color-swatch.selected { border-color: var(--navy); transform: scale(1.15); }

    /* Pen colours */
    .pen-colors .color-swatch[data-color="#1b2632"] { background: #1b2632; }
    .pen-colors .color-swatch[data-color="#e53e3e"] { background: #e53e3e; }
    .pen-colors .color-swatch[data-color="#2b6cb0"] { background: #2b6cb0; }
    .pen-colors .color-swatch[data-color="#276749"] { background: #276749; }
    .pen-colors .color-swatch[data-color="#ffb162"] { background: #ffb162; }
    .pen-colors .color-swatch[data-color="#6b46c1"] { background: #6b46c1; }



    /* Stroke size */
    .size-row {
      display: flex; align-items: center; justify-content: center; gap: 5px;
      padding: 0 3px; flex-shrink: 0;
    }
    .size-dot {
      border-radius: 50%; background: var(--navy-3); cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s; flex-shrink: 0;
    }
    .size-dot:hover { transform: scale(1.25); }
    .size-dot.selected { box-shadow: 0 0 0 2px var(--gold); }
    .size-dot.sm { width: 5px;  height: 5px; }
    .size-dot.md { width: 9px;  height: 9px; }
    .size-dot.lg { width: 14px; height: 14px; }

    /* ── DOCUMENT AREA ── */
    .document-area {
      flex: 1; min-height: 0; height: 100%;
      overflow-y: auto; overflow-x: hidden;
      background: #d8d3cb; display: flex; justify-content: center; align-items: flex-start;
      padding: 28px 24px 24px; /* tools bar merged into the topbar, so no extra top clearance */
      margin-left: 200px; /* file panel only */
    }
    .document-area::-webkit-scrollbar { width: 5px; }
    .document-area::-webkit-scrollbar-track { background: transparent; }
    .document-area::-webkit-scrollbar-thumb { background: var(--cream-3); border-radius: 3px; }

    .doc-page-wrap {
      position: relative; width: 100%; max-width: 780px;
    }
    .doc-page {
      background: var(--white); border-radius: 4px;
      box-shadow: 0 2px 8px rgba(30,45,74,0.10), 0 0 0 1px rgba(30,45,74,0.05);
      min-height: calc(100vh - 52px - 44px); position: relative; overflow: hidden;
    }

    /* Canvas sits on top */
    #annotationCanvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; display: block;
      cursor: crosshair;
    }
    #annotationCanvas.eraser-mode { cursor: cell; }

    /* Empty-state hint */
    .doc-hint {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      pointer-events: none; z-index: 1;
    }
    .doc-hint svg { width: 48px; height: 48px; color: var(--cream-2); stroke-width: 1.2; }
    .doc-hint p { font-size: 0.82rem; color: var(--cream-3); font-weight: 500; }

    /* ── AI SIDEBAR ── */
    .ai-sidebar {
      width: 0; flex-shrink: 0; overflow: hidden;
      display: flex; flex-direction: column;
      background: var(--white); border-left: 1px solid transparent;
      transition: width 0.32s cubic-bezier(0.4,0,0.2,1), border-color 0.32s;
      position: relative; z-index: 33;
    }
    .ai-sidebar.open { width: 280px; border-left-color: var(--cream-2); }
    .ai-sidebar-inner { width: 280px; display: flex; flex-direction: column; height: 100%; }

    .ai-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px; height: 52px; border-bottom: 1px solid var(--cream-2); flex-shrink: 0;
    }
    .ai-title { display: flex; align-items: center; gap: 8px; font-size: 0.88rem; font-weight: 600; color: var(--ink); }
    .ai-dot { width: 8px; height: 8px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--navy)); }
    .ai-close {
      width: 28px; height: 28px; border-radius: 7px; border: none;
      background: transparent; color: var(--muted);
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: background 0.15s;
    }
    .ai-close:hover { background: var(--cream-2); color: var(--navy); }
    .ai-close svg { width: 14px; height: 14px; stroke-width: 2.5; }

    .ai-body { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .ai-suggestions { padding: 20px 16px 8px; display: flex; flex-direction: column; gap: 8px; }
    .ai-suggestion-label {
      font-size: 0.67rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted); padding: 0 4px; margin-bottom: 4px;
    }
    .ai-chip {
      display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: 10px;
      border: 1.5px solid var(--cream-2); background: var(--cream); cursor: pointer; text-align: left;
      transition: border-color 0.18s, background 0.18s, transform 0.15s;
    }
    .ai-chip:hover { border-color: var(--gold-2); background: rgba(184,146,42,0.04); transform: translateX(2px); }
    .chip-arrow { width: 16px; height: 16px; flex-shrink: 0; color: var(--gold); }
    .chip-arrow svg { width: 16px; height: 16px; stroke-width: 2; }
    .chip-text { font-size: 0.81rem; font-weight: 500; color: var(--navy-2); line-height: 1.3; }

    .ai-response { display: none; padding: 16px; flex-direction: column; gap: 12px; }
    .ai-response.show { display: flex; }
    .ai-response-bubble {
      background: linear-gradient(135deg, rgba(30,45,74,0.03), rgba(184,146,42,0.05));
      border: 1px solid var(--cream-2); border-radius: 12px;
      padding: 14px 16px; font-size: 0.82rem; line-height: 1.75; color: var(--ink);
    }
    .ai-response-label {
      font-size: 0.67rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
      color: var(--gold); margin-bottom: 10px; display: flex; align-items: center; gap: 6px;
    }
    .ai-response-label::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }

    .typing-indicator { display: none; align-items: center; gap: 5px; padding: 8px 4px; }
    .typing-indicator.show { display: flex; }
    .typing-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--gold); opacity: 0.5;
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    .ai-input-area { padding: 12px 16px 16px; border-top: 1px solid var(--cream-2); flex-shrink: 0; }
    .ai-input-wrap {
      display: flex; align-items: flex-end; gap: 8px;
      background: var(--cream); border: 1.5px solid var(--cream-3);
      border-radius: 12px; padding: 10px 12px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .ai-input-wrap:focus-within { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(184,146,42,0.1); }
    .ai-icon-btn {
      width: 28px; height: 28px; border-radius: 7px; border: none;
      background: transparent; color: var(--muted);
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .ai-icon-btn:hover { background: var(--cream-2); color: var(--navy); }
    .ai-icon-btn svg { width: 15px; height: 15px; stroke-width: 1.8; }
    .ai-textarea {
      flex: 1; border: none; outline: none; background: transparent;
      font-family: 'DM Sans', sans-serif; font-size: 0.83rem; color: var(--ink);
      resize: none; min-height: 20px; max-height: 100px; line-height: 1.5;
    }
    .ai-textarea::placeholder { color: var(--muted); }
    .ai-send-btn {
      width: 30px; height: 30px; border-radius: 8px; border: none;
      background: var(--navy); color: var(--cream); display: flex; align-items: center;
      justify-content: center; cursor: pointer; flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    .ai-send-btn:hover { background: var(--navy-2); transform: scale(1.05); }
    .ai-send-btn svg { width: 13px; height: 13px; stroke-width: 2.2; }
    .ai-disclaimer { font-size: 0.67rem; color: var(--muted); text-align: center; margin-top: 8px; line-height: 1.4; }
    .ai-disclaimer a { color: var(--gold); text-decoration: none; }

    /* ── NOTES PANEL ── */
    .notes-panel {
      width: 0; flex-shrink: 0; overflow: hidden;
      display: flex; flex-direction: column;
      background: #fffef9; border-left: 1px solid transparent;
      transition: width 0.32s cubic-bezier(0.4,0,0.2,1), border-color 0.32s;
      position: relative; z-index: 33;
    }
    .notes-panel.open { width: 300px; border-left-color: var(--cream-2); }
    .notes-inner { width: 300px; display: flex; flex-direction: column; height: 100%; overflow: hidden; }

    .notes-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 52px; border-bottom: 1px solid var(--cream-2); flex-shrink: 0;
    }
    .notes-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.88rem; font-weight: 600; color: var(--ink);
    }
    .notes-title svg { width: 15px; height: 15px; stroke-width: 2; color: var(--gold); }
    .notes-close {
      width: 28px; height: 28px; border-radius: 7px; border: none;
      background: transparent; color: var(--muted);
      display: flex; align-items: center; justify-content: center; cursor: pointer;
      transition: background 0.15s;
    }
    .notes-close:hover { background: var(--cream-2); color: var(--navy); }
    .notes-close svg { width: 14px; height: 14px; stroke-width: 2.5; }

    .notes-list {
      flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 10px;
    }
    .notes-list::-webkit-scrollbar { width: 4px; }
    .notes-list::-webkit-scrollbar-thumb { background: var(--cream-3); border-radius: 3px; }

    .note-empty {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; color: var(--cream-3); padding: 40px 20px; text-align: center;
    }
    .note-empty svg { width: 36px; height: 36px; stroke-width: 1.3; }
    .note-empty p { font-size: 0.8rem; font-weight: 500; }

    .note-card {
      background: var(--white); border: 1px solid var(--cream-2); border-radius: 12px;
      padding: 12px 14px; position: relative; group: true;
      box-shadow: 0 1px 6px rgba(30,45,74,0.04);
      animation: noteSlide 0.2s ease;
    }
    @keyframes noteSlide { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .note-card:hover .note-delete { opacity: 1; }
    .note-text {
      font-size: 0.82rem; line-height: 1.65; color: var(--ink);
      white-space: pre-wrap; word-break: break-word;
    }
    .note-meta {
      margin-top: 8px; font-size: 0.66rem; color: var(--muted);
      display: flex; align-items: center; justify-content: space-between;
    }
    .note-delete {
      opacity: 0; background: none; border: none; cursor: pointer;
      color: var(--muted); padding: 2px 4px; border-radius: 4px;
      font-size: 0.7rem; transition: opacity 0.15s, color 0.15s, background 0.15s;
      display: flex; align-items: center; gap: 3px;
    }
    .note-delete:hover { color: #e53e3e; background: rgba(229,62,62,0.08); }
    .note-delete svg { width: 11px; height: 11px; stroke-width: 2; }

    .notes-input-area {
      padding: 12px 14px 16px; border-top: 1px solid var(--cream-2); flex-shrink: 0;
      background: #fffef9;
    }
    .notes-textarea {
      width: 100%; border: 1.5px solid var(--cream-3); border-radius: 11px;
      padding: 10px 12px; font-family: 'DM Sans', sans-serif;
      font-size: 0.83rem; color: var(--ink); background: var(--white);
      resize: none; outline: none; line-height: 1.55;
      min-height: 72px; max-height: 160px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .notes-textarea::placeholder { color: var(--muted); }
    .notes-textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(184,146,42,0.1); }
    .notes-actions {
      display: flex; align-items: center; justify-content: space-between; margin-top: 8px;
    }
    .notes-count { font-size: 0.67rem; color: var(--muted); }
    .note-add-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--navy); color: var(--cream); border: none; border-radius: 8px;
      padding: 6px 14px; font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .note-add-btn:hover { background: var(--navy-2); }
    .note-add-btn svg { width: 12px; height: 12px; stroke-width: 2.5; }
    .note-add-btn:disabled { opacity: 0.4; cursor: default; }

    .notes-toggle-btn {
      display: flex; align-items: center; gap: 7px;
      background: transparent; color: var(--navy-2); border: 1.5px solid var(--cream-3); border-radius: 9px;
      padding: 6px 14px; font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .notes-toggle-btn:hover { background: var(--cream-2); }
    .notes-toggle-btn.active {
      background: rgba(184,146,42,0.12); color: var(--gold);
      box-shadow: 0 0 0 1.5px var(--gold-2); border-color: transparent;
    }
    .notes-toggle-btn svg { width: 14px; height: 14px; stroke-width: 2; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--navy); color: var(--cream);
      padding: 10px 22px; border-radius: 30px; font-size: 0.8rem; font-weight: 500;
      box-shadow: 0 4px 20px rgba(30,45,74,0.2);
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Active tool indicator dot on size-dot when eraser */
    .tool-btn[data-tool="eraser"].active { color: #e53e3e; border-color: #e53e3e; background: rgba(229,62,62,0.08); }
    /* ── NOTIFICATION BELL ── */
    .notif-btn {
      position: relative;
      width: 36px; height: 36px;
      border-radius: 9px; border: none;
      background: transparent;
      color: var(--navy-2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .notif-btn:hover { background: var(--cream-2); color: var(--navy); }
    .notif-btn svg { width: 18px; height: 18px; stroke-width: 1.7; }
    .notif-badge {
      display: none;
      position: absolute; top: 4px; right: 4px;
      min-width: 16px; height: 16px;
      background: var(--danger); color: var(--white);
      border-radius: 8px; border: 2px solid var(--cream);
      font-size: 0.6rem; font-weight: 700;
      align-items: center; justify-content: center;
      line-height: 1; padding: 0 3px;
    }
    .notif-badge.show { display: flex; }

    /* Notification panel */
    .notif-panel {
      position: fixed; top: 62px; left: 62px;
      width: 340px;
      background: var(--white);
      border: 1px solid var(--cream-2);
      border-radius: 16px;
      box-shadow: 0 12px 48px rgba(30,45,74,0.16);
      z-index: 500;
      opacity: 0; pointer-events: none;
      transform: translateY(-8px) scale(0.97);
      transform-origin: top left;
      transition: opacity 0.18s, transform 0.18s;
      overflow: hidden;
    }
    .notif-panel.open { opacity: 1; pointer-events: all; transform: translateY(0) scale(1); }

    .notif-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--cream-2);
    }
    .notif-panel-title {
      font-size: 0.9rem; font-weight: 700; color: var(--ink);
      font-family: 'Playfair Display', serif;
    }
    .notif-mark-read {
      font-size: 0.75rem; font-weight: 500; color: var(--gold);
      background: none; border: none; cursor: pointer;
      transition: color 0.15s; padding: 6px 14px;
    }
    .notif-mark-read:hover { color: var(--navy); }

    .notif-list { max-height: 380px; overflow-y: auto; }
    .notif-list::-webkit-scrollbar { width: 4px; }
    .notif-list::-webkit-scrollbar-thumb { background: var(--cream-3); border-radius: 2px; }

    .notif-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--cream-2);
      cursor: pointer;
      transition: background 0.13s;
      position: relative;
    }
    .notif-item:last-child { border-bottom: none; }
    .notif-item:hover { background: var(--cream); }
    .notif-item.unread { background: rgba(184,146,42,0.04); }
    .notif-item.unread:hover { background: rgba(184,146,42,0.08); }

    .notif-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold); flex-shrink: 0; margin-top: 6px;
      transition: opacity 0.2s;
    }
    .notif-item:not(.unread) .notif-dot { opacity: 0; }

    .notif-icon {
      width: 34px; height: 34px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .notif-icon.hearing { background: rgba(41,128,185,0.12); color: #2980b9; }
    .notif-icon.deadline { background: rgba(192,57,43,0.1); color: var(--danger); }
    .notif-icon.upload { background: rgba(39,174,96,0.1); color: var(--success); }
    .notif-icon.reminder { background: rgba(184,146,42,0.13); color: var(--gold); }
    .notif-icon svg { width: 16px; height: 16px; stroke-width: 1.8; }

    .notif-body { flex: 1; min-width: 0; }
    .notif-body-title {
      font-size: 0.83rem; font-weight: 600; color: var(--ink);
      margin-bottom: 2px; line-height: 1.3;
    }
    .notif-body-text {
      font-size: 0.76rem; color: var(--muted); line-height: 1.45;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .notif-time {
      font-size: 0.68rem; color: var(--muted); flex-shrink: 0; padding-top: 3px;
    }

    .notif-empty {
      padding: 36px 18px; text-align: center;
      font-size: 0.83rem; color: var(--muted); line-height: 1.5;
    }
    .notif-empty svg { width: 32px; height: 32px; stroke: var(--cream-3); margin-bottom: 10px; }

    /* ── UPLOAD BUTTON ── */
    .upload-btn {
      display: flex; align-items: center; gap: 7px;
      background: transparent; color: var(--navy-2);
      border: 1.5px solid var(--cream-3); border-radius: 9px;
      padding: 6px 14px; font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s, border-color 0.18s, color 0.15s;
    }
    .upload-btn:hover { background: var(--cream-2); border-color: var(--gold-2); color: var(--navy); }
    .upload-btn svg { width: 14px; height: 14px; stroke-width: 2; }

    /* ── FILE PANEL ── */
    .file-panel {
      width: 200px; flex-shrink: 0;
      background: var(--cream); border-right: 1px solid var(--cream-2);
      display: flex; flex-direction: column;
      overflow-y: auto;
      position: fixed;
      top: 52px; left: 52px; bottom: 0;
      z-index: 34;
    }
    .file-panel-header {
      padding: 12px 12px 8px;
      border-bottom: 1px solid var(--cream-2);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .file-panel-title {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--muted);
    }
    .file-add-btn {
      width: 26px; height: 26px; border-radius: 7px; border: 1.5px dashed var(--cream-3);
      background: transparent; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    }
    .file-add-btn:hover { border-color: var(--gold-2); color: var(--gold); background: rgba(184,146,42,0.06); }
    .file-add-btn svg { width: 13px; height: 13px; stroke-width: 2.2; }
    .file-list {
      flex: 1; overflow-y: auto; padding: 8px 8px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .file-list::-webkit-scrollbar { width: 3px; }
    .file-list::-webkit-scrollbar-thumb { background: var(--cream-3); border-radius: 2px; }
    .file-panel-footer {
      flex-shrink: 0; padding: 10px; border-top: 1px solid var(--cream-2);
    }
    .file-panel-footer .print-btn { width: 100%; justify-content: center; }
    .file-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 9px; cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 0.15s; position: relative; min-width: 0;
    }
    .file-item:hover { background: var(--cream-2); }
    .file-item.active { background: rgba(184,146,42,0.1); border-color: rgba(184,146,42,0.3); }
    .file-item-thumb {
      width: 36px; height: 46px; flex-shrink: 0; border-radius: 4px;
      background: var(--white); border: 1px solid var(--cream-2);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; box-shadow: 0 1px 4px rgba(30,45,74,0.08);
    }
    .file-item-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .file-item-thumb svg { width: 18px; height: 18px; color: var(--cream-3); stroke-width: 1.4; }
    .file-item-info { flex: 1; min-width: 0; }
    .file-item-name {
      font-size: 0.72rem; font-weight: 600; color: var(--ink);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      line-height: 1.3;
    }
    .file-item-meta { font-size: 0.62rem; color: var(--muted); margin-top: 1px; }
    .file-item-del {
      width: 20px; height: 20px; border-radius: 5px; border: none;
      background: transparent; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; opacity: 0; transition: all 0.12s; flex-shrink: 0;
    }
    .file-item:hover .file-item-del { opacity: 1; }
    .file-item-del:hover { background: rgba(229,62,62,0.1); color: #e53e3e; }
    .file-item-del svg { width: 11px; height: 11px; stroke-width: 2.2; }
    .file-empty-state {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 8px; padding: 20px 12px;
      color: var(--cream-3); text-align: center;
    }
    .file-empty-state svg { width: 32px; height: 32px; stroke-width: 1.2; }
    .file-empty-state p { font-size: 0.72rem; line-height: 1.5; font-weight: 500; }
    .file-drop-zone {
      margin: 8px; border: 2px dashed var(--cream-3); border-radius: 10px;
      padding: 14px 8px; text-align: center; cursor: pointer;
      transition: all 0.18s; flex-shrink: 0;
    }
    .file-drop-zone:hover, .file-drop-zone.drag-over {
      border-color: var(--gold-2); background: rgba(184,146,42,0.05);
    }
    .file-drop-zone svg { width: 20px; height: 20px; color: var(--muted); stroke-width: 1.6; margin-bottom: 4px; }
    .file-drop-zone p { font-size: 0.68rem; color: var(--muted); line-height: 1.4; }
    .file-drop-zone strong { color: var(--gold); }

    /* ── MULTI-PAGE DOCUMENT AREA ── */
    .doc-pages-wrap {
      width: 100%; max-width: 820px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
    }
    .doc-page-container {
      width: 100%; position: relative;
    }
    .page-label {
      text-align: center; font-size: 0.68rem; font-weight: 600;
      color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase;
      margin-bottom: 8px; opacity: 0.7;
    }
    .doc-page-inner {
      background: var(--white); border-radius: 4px;
      box-shadow: 0 2px 8px rgba(30,45,74,0.10), 0 0 0 1px rgba(30,45,74,0.05);
      position: relative; overflow: hidden;
    }
    .pdf-bg-canvas {
      display: block; width: 100%; height: auto; max-width: 100%;
    }
    .annotation-canvas {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10; cursor: crosshair;
    }
    .annotation-canvas.eraser-mode { cursor: cell; }

    /* Upload empty-state */
    .doc-upload-hint {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      pointer-events: none; z-index: 1;
    }
    .doc-upload-hint svg { width: 52px; height: 52px; color: var(--cream-3); stroke-width: 1.1; }
    .doc-upload-hint p { font-size: 0.83rem; color: var(--cream-3); font-weight: 500; }
    .doc-upload-hint .hint-sub { font-size: 0.72rem; color: var(--cream-3); opacity: 0.7; }

    /* PDF loading spinner */
    .pdf-loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; padding: 80px 0; width: 100%;
    }
    .pdf-spinner {
      width: 36px; height: 36px; border: 3px solid var(--cream-3);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pdf-loading p { font-size: 0.8rem; color: var(--muted); font-weight: 500; }

    /* Image preview */
    .doc-image-preview {
      display: block; width: 100%; height: auto; border-radius: 4px;
    }

    /* ── EDITABLE DOCX PAGE ── */
    .docx-page {
      width: 100%; max-width: 820px;
      min-height: calc(100vh - 52px - 64px);
      padding: 56px 64px;
    }
    .docx-content {
      outline: none; font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem; line-height: 1.7; color: var(--ink);
      word-wrap: break-word;
    }
    .docx-content:focus { outline: none; }
    .docx-content h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; line-height: 1.3; margin: 0.7em 0 0.35em; }
    .docx-content h2 { font-size: 1.3rem; line-height: 1.35; margin: 0.7em 0 0.3em; }
    .docx-content h3 { font-size: 1.12rem; margin: 0.6em 0 0.3em; }
    .docx-content p  { margin: 0 0 0.85em; }
    .docx-content ul, .docx-content ol { margin: 0 0 0.85em 1.4em; }
    .docx-content li { margin-bottom: 0.3em; }
    .docx-content img { max-width: 100%; height: auto; }
    .docx-content table { border-collapse: collapse; margin: 0 0 1em; width: 100%; }
    .docx-content td, .docx-content th { border: 1px solid var(--cream-3); padding: 5px 9px; }
    .docx-content a { color: var(--gold); }

    /* ── DOCX FORMATTING TOOLBAR ── */
    .docx-toolbar {
      position: sticky; top: 52px; z-index: 20;
      display: flex; flex-wrap: wrap; align-items: center; gap: 3px;
      width: 100%; max-width: 820px;
      background: var(--white); border: 1px solid var(--cream-2);
      border-radius: 10px; padding: 6px 8px;
      box-shadow: 0 2px 10px rgba(30,45,74,0.08);
    }
    .docx-tool {
      min-width: 30px; height: 30px; padding: 0 9px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 7px; border: 1px solid transparent; cursor: pointer;
      font-size: 0.82rem; font-weight: 700; color: var(--navy-2);
      background: transparent; user-select: none;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .docx-tool:hover { background: var(--cream); border-color: var(--cream-2); color: var(--navy); }
    .docx-tool svg { width: 15px; height: 15px; stroke-width: 2; }
    .docx-tool.italic  { font-style: italic; }
    .docx-tool.underline { text-decoration: underline; }
    .docx-sep { width: 1px; height: 20px; background: var(--cream-2); margin: 0 4px; }

    /* ── TEXT-BOX ANNOTATIONS (PDF / image / blank pages) ── */
    .text-annotation {
      position: absolute; z-index: 11; min-width: 36px;
      padding: 2px 5px; border: 1px dashed transparent; border-radius: 4px;
      font-family: 'DM Sans', sans-serif; line-height: 1.4;
      pointer-events: none;
    }
    body.tool-text .text-annotation { pointer-events: auto; border-color: rgba(184,146,42,0.55); }
    body.tool-text .annotation-canvas { pointer-events: none; }
    .text-annotation .ta-text { outline: none; min-width: 28px; white-space: pre-wrap; }
    .text-annotation .ta-text:empty::before {
      content: 'Type…'; color: var(--cream-3);
    }
    .text-annotation .ta-handle,
    .text-annotation .ta-del {
      position: absolute; top: -10px; width: 18px; height: 18px;
      border-radius: 5px; display: none; align-items: center; justify-content: center;
      font-size: 0.7rem; line-height: 1; box-shadow: 0 1px 4px rgba(30,45,74,0.25);
    }
    .text-annotation .ta-handle { left: -10px; background: var(--gold); color: #fff; cursor: move; }
    .text-annotation .ta-del { right: -10px; border-radius: 50%; background: #e53e3e; color: #fff; cursor: pointer; }
    .text-annotation .ta-handle svg { width: 11px; height: 11px; stroke-width: 2.4; }
    body.tool-text .text-annotation:hover .ta-handle,
    body.tool-text .text-annotation:hover .ta-del { display: flex; }

    /* ── EDITABLE PDF TEXT LAYER ──
       Text extracted from the PDF, positioned over the rendered page.
       Transparent by default (the canvas shows the real text); when you
       click a run in Text mode it becomes opaque and masks the original,
       so edits replace the underlying text cleanly. */
    .pdf-text-layer {
      position: absolute; top: 0; left: 0;
      z-index: 9; pointer-events: none; overflow: hidden;
    }
    .pdf-text-item {
      position: absolute; white-space: pre; line-height: 1;
      color: transparent; background: transparent;
      font-family: sans-serif; cursor: text;
      pointer-events: none; outline: none; transform-origin: 0 0;
    }
    body.tool-text .pdf-text-item { pointer-events: auto; }
    body.tool-text .pdf-text-item:hover {
      background: rgba(184,146,42,0.12);
      box-shadow: 0 0 0 1px rgba(184,146,42,0.5);
    }
    .pdf-text-item.editing,
    .pdf-text-item.edited {
      color: #1b2632; background: var(--pdf-page-bg, #fff);
    }
    /* white halo extends the mask a touch past the substitute glyphs so the
       original baked text underneath is fully covered */
    .pdf-text-item.edited  { box-shadow: 0 0 0 2px var(--pdf-page-bg, #fff); }
    .pdf-text-item.editing { box-shadow: 0 0 0 2px var(--gold); }

    /* ── UNIFIED "SIGN-UP" BUTTON STYLE (ported from index.html) ──
       Every button + link-button on this page adopts the index page's
       primary "Get started" look: glossy navy-gradient pill, white text,
       1px navy border, soft drop shadow and a 2px hover lift.
       Each element keeps its own width/height/padding so the layout
       doesn't collapse — only the visual skin is unified. */
    button:not(.ai-chip),
    a.s-btn {
      background: #1a1a1a !important;
      color: #ffffff !important;
      border: none !important;
      border-radius: 999px !important;
      font-family: inherit !important;
      font-weight: 700 !important;
      letter-spacing: -0.2px !important;
      cursor: pointer !important;
      text-decoration: none !important;
      box-shadow: none !important;
      transition: transform .18s ease, box-shadow .25s ease, filter .25s ease !important;
    }
    /* icons inside buttons follow the white text colour */
    button:not(.ai-chip) svg,
    a.s-btn svg { stroke: #ffffff !important; color: #ffffff !important; }
    /* ── SIDEBAR BUTTONS: flat cream pills (links + active page) ── */
    .sidebar .s-btn,
    .sidebar a.s-btn {
      background: #ece6d8 !important;
      color: #2c3b4d !important;
      border: none !important;
      box-shadow: none !important;
    }
    .sidebar .s-btn svg,
    .sidebar a.s-btn svg { stroke: #2c3b4d !important; color: #2c3b4d !important; }
    /* hover lift, exactly like the index "Get started" button */
    button:not(.ai-chip):hover,
    a.s-btn:hover { transform: translateY(-2px) !important; filter: brightness(1.07) !important; }
    /* keep disabled buttons visibly inert */
    button:not(.ai-chip):disabled { filter: none !important; opacity: 0.5 !important; transform: none !important; cursor: not-allowed !important; }

    /* ── SIDEBAR BUTTONS: white (light) pill instead of navy ── */
    a.s-btn,
    button.s-btn {
