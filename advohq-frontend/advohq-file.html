<script>
  /* ── PDF.js worker ── */
  if (typeof pdfjsLib !== 'undefined') {
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  }

  /* ── URL param ── */
  const params = new URLSearchParams(location.search);
  const fname = params.get('file');
  if (fname) document.getElementById('topbarFilename').value = decodeURIComponent(fname);

  /* ═══════════════════════════════════════════
     MULTI-PAGE DRAWING SYSTEM
     Each page has its own { canvas, ctx, strokes }
     stored in pageStates[].
     The single blank page on load uses index 0.
  ═══════════════════════════════════════════ */
  let pageStates = [];   // { canvas, ctx, strokes }
  let toastTimer;

  /* ── State (shared across all pages) ── */
  let activeTool = 'pen';
  let penColor   = '#1b2632';
  let hlColor    = 'rgba(255,235,59,0.28)';
  let penSize    = 4;   // pen thickness (also used by eraser & text)
  let hlSize     = 4;   // highlighter thickness
  let docxEditable = null;    // contenteditable element when a Word doc is open
  let currentFileName = null; // name of the file currently displayed

  /* ── Init blank page ── */
  function initBlankPage() {
    const canvas = document.getElementById('annotationCanvas');
    const docPage = document.getElementById('docPage');
    const hint = document.getElementById('docHint');
    const ctx = canvas.getContext('2d');
    docxEditable = null;
    pageStates = [{ canvas, ctx, strokes: [], hint, inner: docPage }];
    resizePageCanvas(0, docPage);
    attachCanvasEvents(canvas, 0);
    attachTextLayer(docPage, 0);
    window.addEventListener('resize', () => resizePageCanvas(0, docPage));
  }

  function resizePageCanvas(idx, container) {
    const state = pageStates[idx];
    if (!state) return;
    const { canvas, ctx } = state;
    const dpr = window.devicePixelRatio || 1;
    const img = canvas.toDataURL();
    canvas.width  = container.offsetWidth  * dpr;
    canvas.height = container.offsetHeight * dpr;
    canvas.style.width  = container.offsetWidth  + 'px';
    canvas.style.height = container.offsetHeight + 'px';
    ctx.scale(dpr, dpr);
    const image = new Image();
    image.onload = () => ctx.drawImage(image, 0, 0);
    image.src = img;
  }

  function attachCanvasEvents(canvas, idx) {
    canvas.addEventListener('mousedown',  e => startDraw(e, idx));
    canvas.addEventListener('mousemove',  e => draw(e, idx));
    canvas.addEventListener('mouseup',    e => endDraw(e, idx));
    canvas.addEventListener('mouseleave', e => endDraw(e, idx));
    canvas.addEventListener('touchstart', e => startDraw(e, idx), { passive: false });
    canvas.addEventListener('touchmove',  e => draw(e, idx),      { passive: false });
    canvas.addEventListener('touchend',   e => endDraw(e, idx));
  }

  /* ═══════════════════════════════════════════
     TEXT TOOL — click a page to drop an editable,
     draggable text box (works on PDF, image & blank pages)
  ═══════════════════════════════════════════ */
  function attachTextLayer(inner, idx) {
    if (!inner || inner._textLayer) return;
    inner._textLayer = true;
    inner.addEventListener('mousedown', e => {
      if (activeTool !== 'text') return;
      // editing/moving an existing box, or editing extracted PDF text — don't drop a new box
      if (e.target.closest('.text-annotation') || e.target.closest('.pdf-text-item')) return;
      const rect = inner.getBoundingClientRect();
      createTextBox(inner, e.clientX - rect.left, e.clientY - rect.top);
    });
  }

  function createTextBox(inner, x, y, initial) {
    const box = document.createElement('div');
    box.className = 'text-annotation';
    box.style.left = x + 'px';
    box.style.top  = y + 'px';
    box.style.color = penColor;
    box.style.fontSize = (13 + penSize * 2) + 'px';

    const handle = document.createElement('div');
    handle.className = 'ta-handle';
    handle.title = 'Drag to move';
    handle.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg>`;

    const del = document.createElement('div');
    del.className = 'ta-del';
    del.title = 'Delete';
    del.textContent = '×';
    del.addEventListener('mousedown', e => { e.preventDefault(); e.stopPropagation(); box.remove(); });

    const content = document.createElement('div');
    content.className = 'ta-text';
    content.contentEditable = 'true';
    content.textContent = initial || '';
    content.addEventListener('blur', () => { if (!content.textContent.trim()) box.remove(); });

    box.appendChild(handle);
    box.appendChild(del);
    box.appendChild(content);
    inner.appendChild(box);
    setTimeout(() => content.focus(), 0);
    makeBoxDraggable(box, handle, inner);
  }

  function makeBoxDraggable(box, handle, inner) {
    handle.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      const rect = inner.getBoundingClientRect();
      const offX = e.clientX - rect.left - box.offsetLeft;
      const offY = e.clientY - rect.top  - box.offsetTop;
      function move(ev) {
        box.style.left = Math.max(0, ev.clientX - rect.left - offX) + 'px';
        box.style.top  = Math.max(0, ev.clientY - rect.top  - offY) + 'px';
      }
      function up() {
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', up);
      }
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
    });
  }

  /* ── Drawing ── */
  let isDrawing = false;
  let currentPath = [];
  let activeIdx = 0;
  // Highlight-specific state
  let hlStartX = 0, hlStartY = 0;
  let baseSnapshot = null; // canvas snapshot taken before the current highlight stroke

  function getPos(e, canvas) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches) return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
    return { x: e.clientX - rect.left, y: e.clientY - rect.top };
  }

  function startDraw(e, idx) {
    e.preventDefault();
    isDrawing = true;
    activeIdx = idx;
    const state = pageStates[idx];
    if (!state) return;
    const { canvas, ctx, hint } = state;
    if (hint) hint.style.display = 'none';
    const pos = getPos(e, canvas);
    currentPath = [pos];

    if (activeTool === 'highlight') {
      hlStartX = pos.x;
      hlStartY = pos.y;
      // Snapshot the canvas before this stroke so we can restore per-frame
      baseSnapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
    } else {
      ctx.beginPath();
      ctx.moveTo(pos.x, pos.y);
      applyStyle(ctx);
    }
  }

  function draw(e, idx) {
    if (!isDrawing || idx !== activeIdx) return;
    e.preventDefault();
    const state = pageStates[idx];
    if (!state) return;
    const { canvas, ctx } = state;
    const pos = getPos(e, canvas);
    currentPath.push(pos);

    if (activeTool === 'eraser') {
      const es = penSize * 6;
      ctx.clearRect(pos.x - es/2, pos.y - es/2, es, es);
    } else if (activeTool === 'highlight') {
      // Restore snapshot each frame so segments don't stack
      if (baseSnapshot) ctx.putImageData(baseSnapshot, 0, 0);
      const hs = hlSize * 6;
      const x = Math.min(hlStartX, pos.x);
      const w = Math.abs(pos.x - hlStartX);
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      ctx.fillStyle = hlColor;
      ctx.fillRect(x, hlStartY - hs / 2, w, hs);
    } else {
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
    }
  }

  function endDraw(e, idx) {
    if (!isDrawing || idx !== activeIdx) return;
    isDrawing = false;
    const state = pageStates[idx];
    if (!state) return;
    const { ctx } = state;

    if (activeTool === 'highlight') {
      // Rectangle is already drawn; save as two-point stroke for undo/redraw
      const lastPos = currentPath[currentPath.length - 1] || { x: hlStartX, y: hlStartY };
      if (Math.abs(lastPos.x - hlStartX) > 2) {
        state.strokes.push({
          tool: 'highlight',
          color: hlColor,
          size: hlSize,
          path: [{ x: hlStartX, y: hlStartY }, lastPos]
        });
      }
      baseSnapshot = null;
    } else if (activeTool !== 'eraser') {
      state.strokes.push({
        tool: activeTool,
        color: penColor,
        size: penSize,
        path: [...currentPath]
      });
      ctx.closePath();
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
  }

  function applyStyle(ctx) {
    if (activeTool === 'pen') {
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      ctx.strokeStyle = penColor;
      ctx.lineWidth   = penSize;
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';
    } else if (activeTool === 'highlight') {
      ctx.globalCompositeOperation = 'source-over';
      ctx.globalAlpha = 1;
      ctx.strokeStyle = hlColor;
      ctx.lineWidth   = hlSize * 6;
      ctx.lineCap     = 'square';
      ctx.lineJoin    = 'round';
    }
  }

  /* ── Tool switching ── */
  function setTool(tool) {
    activeTool = tool;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === tool));
    document.querySelectorAll('.annotation-canvas').forEach(c => c.classList.toggle('eraser-mode', tool === 'eraser'));
    // Text mode lets clicks reach the page so text boxes can be placed/edited
    document.body.classList.toggle('tool-text', tool === 'text');
  }

  function setPenColor(el) {
    penColor = el.dataset.color;
    document.querySelectorAll('#penColors .color-swatch').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    setTool('pen');
  }

  function setHlColor(el) {
    hlColor = el.dataset.color;
    document.querySelectorAll('#hlColors .color-swatch').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    setTool('highlight');
  }

  function setPenSize(el) {
    penSize = parseInt(el.dataset.size);
    document.querySelectorAll('#penSizeRow .size-dot').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
    setTool('pen');
  }

  function setHlSize(el) {
    hlSize = parseInt(el.dataset.size);
    document.querySelectorAll('#hlSizeRow .size-dot').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
    setTool('highlight');
  }

  /* ── Undo (acts on the most recently active page) ── */
  function undoStroke() {
    const state = pageStates[activeIdx];
    if (!state) return;
    state.strokes.pop();
    redrawPage(activeIdx);
  }

  function redrawPage(idx) {
    const state = pageStates[idx];
    if (!state) return;
    const { canvas, ctx, strokes, hint } = state;
    const dpr = window.devicePixelRatio || 1;
    ctx.clearRect(0, 0, canvas.width / dpr, canvas.height / dpr);
    strokes.forEach(s => {
      if (!s.path.length) return;
      ctx.beginPath();
      if (s.tool === 'pen') {
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha  = 1;
        ctx.strokeStyle  = s.color;
        ctx.lineWidth    = s.size;
        ctx.lineCap      = 'round';
        ctx.lineJoin     = 'round';
        ctx.moveTo(s.path[0].x, s.path[0].y);
        s.path.forEach(p => ctx.lineTo(p.x, p.y));
        ctx.stroke();
      } else if (s.tool === 'highlight') {
        // Draw as a single filled rectangle — straight line, no opacity stacking
        if (s.path.length < 2) return;
        const hs = s.size * 6;
        const x = Math.min(s.path[0].x, s.path[1].x);
        const w = Math.abs(s.path[1].x - s.path[0].x);
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1;
        ctx.fillStyle = s.color;
        ctx.fillRect(x, s.path[0].y - hs / 2, w, hs);
      }
      ctx.closePath();
    });
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 1;
    if (hint && strokes.length === 0) hint.style.display = '';
  }

  function clearCanvas() {
    pageStates.forEach((state, idx) => {
      state.strokes = [];
      redrawPage(idx);
      if (state.inner) state.inner.querySelectorAll('.text-annotation').forEach(b => b.remove());
    });
    toast('Canvas cleared');
  }

  /* ═══════════════════════════════════════════
     UPLOAD & FILE HANDLING
  ═══════════════════════════════════════════ */
  /* ══════════════════════════════════════════
     MULTI-FILE MANAGER
  ══════════════════════════════════════════ */
  let fileRegistry = [];   // { id, name, type, fileObj, thumb }
  let activeFileId = null;

  async function handleUpload(e) {
    const files = Array.from(e.target.files);
    e.target.value = '';
    if (!files.length) return;
    for (const file of files) await addFileToRegistry(file);
  }

  async function addFileToRegistry(file) {
    const name = file.name || '';
    const isDocx = file.type === 'application/vnd.openxmlformats-officedocument.wordprocessingml.document' || /\.docx$/i.test(name);
    const isPdf  = file.type === 'application/pdf' || /\.pdf$/i.test(name);
    const isImg  = file.type.startsWith('image/') || /\.(png|jpe?g|webp|gif)$/i.test(name);
    if (!isPdf && !isImg && !isDocx) {
      toast('Unsupported file type. Upload PDF, PNG, or DOCX.'); return;
    }
    const kind = isPdf ? 'pdf' : (isDocx ? 'docx' : 'image');
    const id = Date.now() + Math.random();
    let thumb = null;
    if (isImg) thumb = URL.createObjectURL(file);
    fileRegistry.push({ id, name, type: file.type, kind, fileObj: file, thumb });
    renderFilePanel();
    await switchToFile(id);
  }

  async function switchToFile(id) {
    activeFileId = id;
    const entry = fileRegistry.find(f => f.id === id);
    if (!entry) return;
    currentFileName = entry.name;
    document.getElementById('topbarFilename').value = entry.name;
    renderFilePanel();
    pageStates = [];
    docxEditable = null;
    const kind = entry.kind || (entry.type === 'application/pdf' ? 'pdf' : 'image');
    if (kind === 'pdf') {
      await loadPDF(entry.fileObj, false);
    } else if (kind === 'docx') {
      await loadDocx(entry.fileObj);
    } else {
      await loadImage(entry.fileObj);
    }
  }

  function removeFile(id) {
    fileRegistry = fileRegistry.filter(f => f.id !== id);
    if (activeFileId === id) {
      if (fileRegistry.length > 0) {
        switchToFile(fileRegistry[fileRegistry.length - 1].id);
      } else {
        activeFileId = null;
        document.getElementById('topbarFilename').value = 'Untitled Document';
        // Restore blank page
        const wrap = document.getElementById('docPagesWrap');
        wrap.innerHTML = `
          <div class="doc-page-container" id="blankPageContainer">
            <div class="doc-page-inner" id="docPage" style="min-height: calc(100vh - 52px - 64px);">
              <canvas id="annotationCanvas" class="annotation-canvas"></canvas>
            </div>
          </div>`;
        initBlankPage();
      }
    }
    renderFilePanel();
  }

  function renderFilePanel() {
    const list = document.getElementById('filePanelList');
    if (!list) return;
    list.innerHTML = '';
    if (fileRegistry.length === 0) {
      list.innerHTML = `<div class="file-empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <p>No files yet.<br>Upload PDF, PNG or DOCX above.</p>
      </div>`;
      return;
    }
    fileRegistry.forEach(f => {
      const item = document.createElement('div');
      item.className = 'file-item' + (f.id === activeFileId ? ' active' : '');
      item.onclick = () => switchToFile(f.id);
      const ext = f.name.split('.').pop().toUpperCase();
      item.innerHTML = `
        <div class="file-item-thumb">
          ${f.thumb ? `<img src="${f.thumb}" alt="">` : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`}
        </div>
        <div class="file-item-info">
          <div class="file-item-name" title="${f.name}">${f.name}</div>
          <div class="file-item-meta">${ext}</div>
        </div>
        <button class="file-item-del" onclick="event.stopPropagation();removeFile(${f.id})" title="Remove">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>`;
      list.appendChild(item);
    });
  }

  function setupDropZone() {
    const dz = document.getElementById('fileDropZone');
    if (!dz) return;
    dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
    dz.addEventListener('drop', async e => {
      e.preventDefault(); dz.classList.remove('drag-over');
      const files = Array.from(e.dataTransfer.files);
      for (const file of files) await addFileToRegistry(file);
    });
    dz.addEventListener('click', () => document.getElementById('fileUploadInput').click());
  }

  async function loadPDF(file, append) {
    const wrap = document.getElementById('docPagesWrap');
    if (!append) {
      wrap.innerHTML = `<div class="pdf-loading">
        <div class="pdf-spinner"></div>
        <p>Rendering PDF…</p>
      </div>`;
      pageStates = [];
    }

    try {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      if (!append) wrap.innerHTML = '';
      const totalPages = pdf.numPages;

      // Determine available width for responsive scaling
      const docArea = document.getElementById('documentArea');
      const availW = Math.min(docArea.clientWidth - 48, 820);

      for (let i = 1; i <= totalPages; i++) {
        const page = await pdf.getPage(i);
        const dpr = window.devicePixelRatio || 1;
        // First get viewport at scale 1 to find natural width
        const vpBase = page.getViewport({ scale: 1 });
        const scale = availW / vpBase.width;
        const viewport = page.getViewport({ scale });

        /* Outer container */
        const container = document.createElement('div');
        container.className = 'doc-page-container';

        /* Page label */
        if (totalPages > 1) {
          const lbl = document.createElement('div');
          lbl.className = 'page-label';
          lbl.textContent = `Page ${i} of ${totalPages}`;
          container.appendChild(lbl);
        }

        /* Inner doc page */
        const inner = document.createElement('div');
        inner.className = 'doc-page-inner';
        inner.style.width = viewport.width + 'px';
        inner.style.height = viewport.height + 'px';
        inner.style.maxWidth = '100%';

        /* PDF background canvas */
        const bgCanvas = document.createElement('canvas');
        bgCanvas.className = 'pdf-bg-canvas';
        bgCanvas.width  = viewport.width  * dpr;
        bgCanvas.height = viewport.height * dpr;
        bgCanvas.style.width  = viewport.width  + 'px';
        bgCanvas.style.height = viewport.height + 'px';

        const bgCtx = bgCanvas.getContext('2d');
        bgCtx.scale(dpr, dpr);
        await page.render({ canvasContext: bgCtx, viewport }).promise;

        /* Annotation canvas */
        const annoCanvas = document.createElement('canvas');
        annoCanvas.className = 'annotation-canvas';
        annoCanvas.width  = viewport.width  * dpr;
        annoCanvas.height = viewport.height * dpr;
        annoCanvas.style.width  = viewport.width  + 'px';
        annoCanvas.style.height = viewport.height + 'px';
        const annoCtx = annoCanvas.getContext('2d');
        annoCtx.scale(dpr, dpr);
        if (activeTool === 'eraser') annoCanvas.classList.add('eraser-mode');

        inner.appendChild(bgCanvas);
        inner.appendChild(annoCanvas);
        container.appendChild(inner);
        wrap.appendChild(container);

        /* Editable text layer (extracted PDF text — edit with the Text tool).
           Built after the page is in the DOM so run widths can be measured. */
        await buildPdfTextLayer(inner, page, viewport, bgCtx, dpr);

        const idx = pageStates.length;
        pageStates.push({ canvas: annoCanvas, ctx: annoCtx, strokes: [], hint: null, inner });
        attachCanvasEvents(annoCanvas, idx);
        attachTextLayer(inner, idx);
      }

      toast(`PDF loaded — use the Text tool to edit text`);
    } catch (err) {
      wrap.innerHTML = `<div class="pdf-loading"><p style="color:#e53e3e;">Failed to load PDF. Please try again.</p></div>`;
      console.error(err);
    }
  }

  /* Build an editable text layer over a rendered PDF page. */
  async function buildPdfTextLayer(inner, page, viewport, bgCtx, dpr) {
    // Sample the page background so edited runs can mask the original text
    let pageBg = '#ffffff';
    try {
      const s = Math.max(1, Math.floor(2 * dpr));
      const d = bgCtx.getImageData(s, s, 1, 1).data;
      if (d[3] > 0) pageBg = `rgb(${d[0]},${d[1]},${d[2]})`;
    } catch (e) {}
    inner.style.setProperty('--pdf-page-bg', pageBg);

    let textContent;
    try { textContent = await page.getTextContent(); }
    catch (e) { return; }

    const layer = document.createElement('div');
    layer.className = 'pdf-text-layer';
    layer.style.width  = viewport.width  + 'px';
    layer.style.height = viewport.height + 'px';

    const spans = [];
    textContent.items.forEach(item => {
      if (!item.str || !item.str.trim()) return;
      const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
      const fontHeight = Math.hypot(tx[2], tx[3]);
      if (!fontHeight) return;
      const span = document.createElement('span');
      span.className = 'pdf-text-item';
      span.textContent = item.str;
      span.contentEditable = 'true';
      span.spellcheck = false;
      span.style.left = tx[4] + 'px';
      // tx[5] is the text baseline; offset up by the typical ascent (~0.8em)
      // so the HTML baseline lands on the PDF baseline and the mask covers the run.
      span.style.top  = (tx[5] - fontHeight * 0.8) + 'px';
      span.style.fontSize = fontHeight + 'px';
      span.dataset.w = (item.width * (viewport.scale || 1)) || 0; // target device width
      span.addEventListener('focus', () => span.classList.add('editing'));
      span.addEventListener('input', () => span.classList.add('edited'));
      span.addEventListener('blur',  () => span.classList.remove('editing'));
      layer.appendChild(span);
      spans.push(span);
    });
    inner.appendChild(layer);

    // Stretch each run horizontally to match the original width so the
    // opaque mask lines up when editing (the substitute font differs).
    spans.forEach(span => {
      const target = parseFloat(span.dataset.w);
      if (!target) return;
      const measured = span.getBoundingClientRect().width;
      if (measured > 0) span.style.transform = `scaleX(${target / measured})`;
    });
  }

  async function loadImage(file) {
    const wrap = document.getElementById('docPagesWrap');
    wrap.innerHTML = `<div class="pdf-loading"><div class="pdf-spinner"></div><p>Loading image…</p></div>`;
    pageStates = [];

    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const dpr = window.devicePixelRatio || 1;
      const maxW = Math.min(img.naturalWidth, 820);
      const scale = maxW / img.naturalWidth;
      const w = maxW, h = img.naturalHeight * scale;

      wrap.innerHTML = '';

      const container = document.createElement('div');
      container.className = 'doc-page-container';

      const inner = document.createElement('div');
      inner.className = 'doc-page-inner';
      inner.style.width  = w + 'px';
      inner.style.height = h + 'px';

      /* Image background */
      const imgEl = document.createElement('img');
      imgEl.src = url;
      imgEl.className = 'doc-image-preview';
      imgEl.style.width = '100%';
      imgEl.style.height = h + 'px';
      imgEl.style.objectFit = 'contain';
      imgEl.draggable = false;

      /* Annotation canvas */
      const annoCanvas = document.createElement('canvas');
      annoCanvas.className = 'annotation-canvas';
      annoCanvas.width  = w * dpr;
      annoCanvas.height = h * dpr;
      annoCanvas.style.width  = w + 'px';
      annoCanvas.style.height = h + 'px';
      const annoCtx = annoCanvas.getContext('2d');
      annoCtx.scale(dpr, dpr);
      if (activeTool === 'eraser') annoCanvas.classList.add('eraser-mode');

      inner.appendChild(imgEl);
      inner.appendChild(annoCanvas);
      container.appendChild(inner);
      wrap.appendChild(container);

      pageStates.push({ canvas: annoCanvas, ctx: annoCtx, strokes: [], hint: null, inner });
      attachCanvasEvents(annoCanvas, 0);
      attachTextLayer(inner, 0);
      toast('Image loaded');
    };
    img.onerror = () => {
      wrap.innerHTML = `<div class="pdf-loading"><p style="color:#e53e3e;">Failed to load image.</p></div>`;
    };
    img.src = url;
  }

  /* ═══════════════════════════════════════════
     DOCX — convert to editable rich text (Mammoth)
  ═══════════════════════════════════════════ */
  async function loadDocx(file) {
    const wrap = document.getElementById('docPagesWrap');
    wrap.innerHTML = `<div class="pdf-loading"><div class="pdf-spinner"></div><p>Loading document…</p></div>`;
    pageStates = [];
    docxEditable = null;

    if (typeof mammoth === 'undefined') {
      wrap.innerHTML = `<div class="pdf-loading"><p style="color:#e53e3e;">Word support failed to load. Check your connection and retry.</p></div>`;
      return;
    }

    try {
      const arrayBuffer = await file.arrayBuffer();
      const result = await mammoth.convertToHtml({ arrayBuffer });
      wrap.innerHTML = '';
      wrap.appendChild(buildDocxToolbar());

      const container = document.createElement('div');
      container.className = 'doc-page-container';

      const inner = document.createElement('div');
      inner.className = 'doc-page-inner docx-page';

      const editable = document.createElement('div');
      editable.className = 'docx-content';
      editable.contentEditable = 'true';
      editable.spellcheck = true;
      editable.innerHTML = result.value && result.value.trim() ? result.value : '<p><br></p>';

      inner.appendChild(editable);
      container.appendChild(inner);
      wrap.appendChild(container);

      docxEditable = editable;
      toast('Document loaded — click to edit text');
    } catch (err) {
      wrap.innerHTML = `<div class="pdf-loading"><p style="color:#e53e3e;">Failed to open this Word document.</p></div>`;
      console.error(err);
    }
  }

  function buildDocxToolbar() {
    const bar = document.createElement('div');
    bar.className = 'docx-toolbar';
    bar.innerHTML = `
      <div class="docx-tool" title="Bold (Ctrl+B)" onmousedown="event.preventDefault()" onclick="docCmd('bold')"><b>B</b></div>
      <div class="docx-tool italic" title="Italic (Ctrl+I)" onmousedown="event.preventDefault()" onclick="docCmd('italic')">I</div>
      <div class="docx-tool underline" title="Underline (Ctrl+U)" onmousedown="event.preventDefault()" onclick="docCmd('underline')">U</div>
      <div class="docx-sep"></div>
      <div class="docx-tool" title="Title" onmousedown="event.preventDefault()" onclick="docCmd('formatBlock','H1')">H1</div>
      <div class="docx-tool" title="Heading" onmousedown="event.preventDefault()" onclick="docCmd('formatBlock','H2')">H2</div>
      <div class="docx-tool" title="Normal text" onmousedown="event.preventDefault()" onclick="docCmd('formatBlock','P')">¶</div>
      <div class="docx-sep"></div>
      <div class="docx-tool" title="Bulleted list" onmousedown="event.preventDefault()" onclick="docCmd('insertUnorderedList')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3.5" cy="6" r="1.3"/><circle cx="3.5" cy="12" r="1.3"/><circle cx="3.5" cy="18" r="1.3"/></svg>
      </div>
      <div class="docx-tool" title="Numbered list" onmousedown="event.preventDefault()" onclick="docCmd('insertOrderedList')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 16H4l2 2v0H4"/></svg>
      </div>
      <div class="docx-sep"></div>
      <div class="docx-tool" title="Undo" onmousedown="event.preventDefault()" onclick="docCmd('undo')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
      </div>
      <div class="docx-tool" title="Redo" onmousedown="event.preventDefault()" onclick="docCmd('redo')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/></svg>
      </div>`;
    return bar;
  }

  function docCmd(cmd, val) {
    if (!docxEditable) return;
    docxEditable.focus();
    document.execCommand(cmd, false, val || null);
  }

  /* ── Save / export ── */
  function saveDocument() {
    if (docxEditable) { exportDocx(); }
    else { toast('Document saved'); }
  }

  function exportDocx() {
    if (!docxEditable) return;
    const baseName = (currentFileName || 'document').replace(/\.[^.]+$/, '');
    const body = docxEditable.innerHTML;
    const html =
      `<!DOCTYPE html><html xmlns:o='urn:schemas-microsoft-com:office:office' ` +
      `xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>` +
      `<head><meta charset='utf-8'><title>${baseName}</title></head><body>${body}</body></html>`;
    let blob, ext;
    try {
      if (typeof htmlDocx !== 'undefined' && htmlDocx.asBlob) {
        blob = htmlDocx.asBlob(html); ext = 'docx';
      } else {
        blob = new Blob(['﻿', html], { type: 'application/msword' }); ext = 'doc';
      }
    } catch (e) {
      blob = new Blob(['﻿', html], { type: 'application/msword' }); ext = 'doc';
    }
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = baseName + '-edited.' + ext;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 1000);
    toast('Document exported (.' + ext + ')');
  }

  /* ── Move the tools toolbar up into the topbar ── */
  (function relocateToolsIntoTopbar() {
    const tools = document.querySelector('.tools-panel');
    const topbar = document.querySelector('.topbar');
    const right = document.querySelector('.topbar-right');
    if (tools && topbar && right) topbar.insertBefore(tools, right);
  })();

  /* ── Init blank page on load ── */
  initBlankPage();
  renderFilePanel();
  setupDropZone();

  /* ── Auto-load file(s) passed from home page ── */
  (async () => {
    // New multi-file key takes priority
    const rawMulti = localStorage.getItem('advohq_open_files');
    const rawSingle = localStorage.getItem('advohq_open_file');

    if (rawMulti) {
      localStorage.removeItem('advohq_open_files');
      localStorage.removeItem('advohq_open_file');
      try {
        const entries = JSON.parse(rawMulti);
        // Load all files; switch to the active one last so it ends up displayed
        const activeEntry = entries.find(e => e.active) || entries[0];
        const others = entries.filter(e => !e.active);

        // Load non-active files silently first
        for (const entry of others) {
          const res = await fetch(entry.dataUrl);
          const blob = await res.blob();
          const file = new File([blob], entry.name, { type: entry.mimeType });
          await addFileToRegistry(file);
        }
        // Load active file last so it becomes the displayed one
        if (activeEntry) {
          const res = await fetch(activeEntry.dataUrl);
          const blob = await res.blob();
          const file = new File([blob], activeEntry.name, { type: activeEntry.mimeType });
          await addFileToRegistry(file);
        }
      } catch(e) {
        console.error('Failed to load files from library:', e);
      }
    } else if (rawSingle) {
      localStorage.removeItem('advohq_open_file');
      try {
        const { name, mimeType, dataUrl } = JSON.parse(rawSingle);
        const res = await fetch(dataUrl);
        const blob = await res.blob();
        const file = new File([blob], name, { type: mimeType });
        await addFileToRegistry(file);
      } catch(e) {
        console.error('Failed to load file from library:', e);
      }
    }
  })();

  /* ── AI panel ── */
  let aiOpen = false;
  function toggleAI() {
    aiOpen = !aiOpen;
    document.getElementById('aiSidebar').classList.toggle('open', aiOpen);
    document.getElementById('aiToggleBtn').classList.toggle('active', aiOpen);
    document.body.classList.toggle('ai-open', aiOpen);
  }

  function printDoc() {
    window.print();
  }

  function askAI(question) {
    if (!aiOpen) toggleAI();
    document.getElementById('aiSuggestions').style.display = 'none';
    const response = document.getElementById('aiResponse');
    const typing   = document.getElementById('typingIndicator');
    const bubble   = document.getElementById('aiResponseBubble');
    response.classList.add('show');
    typing.classList.add('show');
    bubble.style.display = 'none';
    setTimeout(() => {
      typing.classList.remove('show');
      bubble.style.display = 'block';
      document.getElementById('aiResponseText').innerHTML =
        `I've analysed the document for: <em>"${question}"</em><br><br>Upload or open a document to get a detailed response. For now this is a blank canvas — add your file from the Library.`;
      document.getElementById('aiBody').scrollTop = 9999;
    }, 1400);
  }

  function sendAiMessage() {
    const input = document.getElementById('aiInput');
    const q = input.value.trim();
    if (!q) return;
    input.value = ''; input.style.height = 'auto';
    askAI(q);
  }

  function handleAiKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAiMessage(); }
  }

  /* ── Notes panel ── */
  let notesOpen = false;
  let notes = [];

  function toggleNotes() {
    notesOpen = !notesOpen;
    document.getElementById('notesPanel').classList.toggle('open', notesOpen);
    document.getElementById('notesToggleBtn').classList.toggle('active', notesOpen);
    document.body.classList.toggle('notes-open', notesOpen);
  }

  function updateNoteBtn() {
    const val = document.getElementById('notesTextarea').value.trim();
    document.getElementById('noteAddBtn').disabled = !val;
  }

  function handleNoteKey(e) {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); addNote(); }
  }

  function addNote() {
    const ta = document.getElementById('notesTextarea');
    const text = ta.value.trim();
    if (!text) return;
    const note = { id: Date.now(), text, time: new Date() };
    notes.unshift(note);
    ta.value = '';
    ta.style.height = 'auto';
    document.getElementById('noteAddBtn').disabled = true;
    renderNotes();
  }

  function deleteNote(id) {
    notes = notes.filter(n => n.id !== id);
    renderNotes();
  }

  function renderNotes() {
    const list = document.getElementById('notesList');
    const empty = document.getElementById('noteEmpty');
    const count = document.getElementById('notesCount');
    count.textContent = notes.length + ' note' + (notes.length !== 1 ? 's' : '');

    // Remove old cards
    list.querySelectorAll('.note-card').forEach(c => c.remove());

    if (notes.length === 0) {
      empty.style.display = '';
      return;
    }
    empty.style.display = 'none';

    notes.forEach(n => {
      const card = document.createElement('div');
      card.className = 'note-card';
      card.innerHTML = `
        <div class="note-text">${escHtml(n.text)}</div>
        <div class="note-meta">
          <span>${formatTime(n.time)}</span>
          <button class="note-delete" onclick="deleteNote(${n.id})">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            Delete
          </button>
        </div>`;
      list.appendChild(card);
    });
  }

  function escHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function formatTime(d) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + ' · ' +
           d.toLocaleDateString([], { day: 'numeric', month: 'short' });
  }

  renderNotes();
  function toast(msg) {
    const el = document.getElementById('toastEl');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
  }

  // ── NOTIFICATIONS ──
  const NOTIF_READ_KEY = 'advohq_notif_read';

  async function renderNotifPanel() {
    const list = document.getElementById('notifList');
    if (!list) return;
    list.innerHTML = '<div class="notif-empty" style="padding:24px;text-align:center;color:var(--muted);font-size:0.82rem;">Loading…</div>';

    try {
      const { notifications, unread_count } = await API.getNotifications();
      updateBadge(unread_count);

      if (!notifications || notifications.length === 0) {
        list.innerHTML = `<div class="notif-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" style="width:32px;height:32px;stroke:var(--cream-3);margin-bottom:10px;display:block;margin-left:auto;margin-right:auto"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>You\'re all caught up!</div>`;
        return;
      }

      const iconMap = {
        day_of:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
        reminder_1d: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
      };
      const typeClass = { day_of: 'deadline', reminder_1d: 'hearing' };

      list.innerHTML = notifications.map(n => {
        const unread = !n.is_read;
        const icon   = iconMap[n.type] || iconMap.reminder_1d;
        const cls    = typeClass[n.type] || 'reminder';
        const time   = n.type === 'day_of' ? 'Today' : 'Tomorrow';
        return `<div class="notif-item${unread ? ' unread' : ''}" onclick="readNotif(${n.id})">
          <div class="notif-dot"></div>
          <div class="notif-icon ${cls}">${icon}</div>
          <div class="notif-body">
            <div class="notif-body-title">${n.title}</div>
            <div class="notif-body-text">${n.body || ''}</div>
          </div>
          <div class="notif-time">${time}</div>
        </div>`;
      }).join('');
    } catch(e) {
      list.innerHTML = '<div class="notif-empty" style="padding:24px;text-align:center;color:var(--muted);font-size:0.82rem;">Could not load notifications.</div>';
    }
  }

  function updateBadge(count) {
    const badge = document.getElementById('notifBadge');
    if (!badge) return;
    badge.textContent = count > 9 ? '9+' : count;
    badge.classList.toggle('show', count > 0);
  }

  async function readNotif(id) {
    try { await API.markNotificationRead(id); } catch(e) {}
    renderNotifPanel();
  }

  async function markAllRead() {
    try { await API.markAllNotificationsRead(); } catch(e) {}
    renderNotifPanel();
  }

  let notifOpen = false;
  function toggleNotifPanel(e) {
    if (e) e.stopPropagation();
    notifOpen = !notifOpen;
    const panel = document.getElementById('notifPanel');
    if (!panel) return;
    if (notifOpen) {
      const btn = document.getElementById('notifBtn');
      if (btn) {
        const r = btn.getBoundingClientRect();
        const vh = window.innerHeight || document.documentElement.clientHeight || 800;
        const top = Math.min(r.top, vh - 460);
        panel.style.top = Math.max(16, top) + 'px';
      }
      renderNotifPanel(); panel.classList.add('open');
    }
    else { panel.classList.remove('open'); }
  }

  // Close panel on outside click (ignore clicks on the bell itself)
  document.addEventListener('click', function(e) {
    if (!notifOpen) return;
    const panel = document.getElementById('notifPanel');
    const btn   = document.getElementById('notifBtn');
    if (panel && !panel.contains(e.target) && btn && !btn.contains(e.target)) {
      notifOpen = false; panel.classList.remove('open');
    }
  });

  // Poll badge count every 60s
  async function pollNotifCount() {
    try {
      const { unread_count } = await API.getNotificationCount();
      updateBadge(unread_count);
    } catch(e) {}
  }

  // Init badge + start polling
  pollNotifCount();
  setInterval(pollNotifCount, 60000);
</script>
<!-- Notification Panel -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-panel-header">
    <span class="notif-panel-title">Notifications</span>
    <button class="notif-mark-read" onclick="markAllRead()">Mark all as read</button>
  </div>
  <div class="notif-list" id="notifList"></div>
</div>

</body>
</html>
